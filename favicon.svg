<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 120" width="512" height="120">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Oil drop icon -->
  <g transform="translate(10, 8)">
    <path d="M40 10 C40 10, 15 45, 15 62 C15 76.5, 26.5 88, 40 88 C53.5 88, 65 76.5, 65 62 C65 45, 40 10, 40 10 Z" 
          fill="url(#dropGrad)" />
    <ellipse cx="32" cy="55" rx="6" ry="8" fill="rgba(255,255,255,0.3)" transform="rotate(-15 32 55)"/>
  </g>
  
  <!-- BOERJIA text -->
  <text x="95" y="78" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" 
        font-size="62" font-weight="900" letter-spacing="4" fill="url(#textGrad)">
    BOERJIA
  </text>
  
  <!-- Subtitle -->
  <text x="97" y="100" font-family="'Helvetica Neue', Arial, sans-serif" 
        font-size="14" font-weight="400" letter-spacing="6" fill="#888888">
    LUBRICANT
  </text>
  
  <!-- Decorative line -->
  <line x1="97" y1="82" x2="490" y2="82" stroke="#FF8C00" stroke-width="1.5" opacity="0.6"/>
</svg>
